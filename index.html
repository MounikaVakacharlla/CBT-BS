<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Testing Demo</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      padding: 40px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #message {
      margin-top: 20px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Login Page</h2>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">

    <button id="loginBtn" onclick="login()">Login</button>

    <p id="message"></p>
  </div>

  <script>
    function login() {

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if(username === "admin" && password === "admin123") {
        document.getElementById("message").innerText =
          "Login Successful!";
      }
      else {
        document.getElementById("message").innerText =
          "Invalid Credentials!";
      }
    }
  </script>

</body>
</html>
